<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka PHM</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        background: linear-gradient(180deg, #f5f5f7, #e5e5ea);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 16px;
    }

    .card {
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(20px);
        padding: 26px;
        border-radius: 28px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        width: 440px;
        max-width: 100%;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    .big-number {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 16px;
    }

    .sub {
        font-size: 13px;
        color: #6e6e73;
        margin-bottom: 10px;
    }

    label {
        font-size: 13px;
        color: #6e6e73;
        margin-top: 12px;
        display: block;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 16px;
        border: none;
        background: #f2f2f7;
        margin-top: 6px;
        font-size: 16px;
    }

    .results {
        margin-top: 18px;
        font-size: 14px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        margin: 6px 0;
    }

    canvas {
        margin-top: 20px;
    }

    /* MOBILE BOOST */
    @media (max-width: 480px) {
        .card { padding: 20px; border-radius: 22px; }
        h1 { font-size: 20px; }
        .big-number { font-size: 26px; }
        input { font-size: 18px; padding: 16px; }
    }
</style>
</head>
<body>

<div class="card">
    <h1>Porovnání nákladů PHM</h1>

    <div class="big-number" id="bigDiff">—</div>
    <div class="sub" id="bigDiffDetail">Zadej hodnoty</div>

    <label>Cena paliva (den X)</label>
    <input type="number" id="priceX">

    <label>Cena paliva (den Y)</label>
    <input type="number" id="priceY">

    <label>Spotřeba (l / 100 km)</label>
    <input type="number" id="consumption">

    <label>Nájezd (km / den)</label>
    <input type="number" id="kmDay">

    <div class="results" id="results"></div>

    <canvas id="chart"></canvas>
</div>

<script>
let chart;

const priceXInput = document.getElementById('priceX');
const priceYInput = document.getElementById('priceY');
const consumptionInput = document.getElementById('consumption');
const kmDayInput = document.getElementById('kmDay');
const results = document.getElementById('results');
const bigDiff = document.getElementById('bigDiff');
const bigDiffDetail = document.getElementById('bigDiffDetail');

function saveValues() {
    localStorage.setItem('phmCalc', JSON.stringify({
        priceX: priceXInput.value,
        priceY: priceYInput.value,
        consumption: consumptionInput.value,
        kmDay: kmDayInput.value
    }));
}

function loadValues() {
    const data = JSON.parse(localStorage.getItem('phmCalc'));
    if (!data) return;
    priceXInput.value = data.priceX || '';
    priceYInput.value = data.priceY || '';
    consumptionInput.value = data.consumption || '';
    kmDayInput.value = data.kmDay || '';
}

function calculate() {
    const priceX = parseFloat(priceXInput.value);
    const priceY = parseFloat(priceYInput.value);
    const consumption = parseFloat(consumptionInput.value);
    const kmDay = parseFloat(kmDayInput.value);

    if (!priceX || !priceY || !consumption || !kmDay) return;

    const costPerKmX = (consumption / 100) * priceX;
    const costPerKmY = (consumption / 100) * priceY;

    const dailyX = costPerKmX * kmDay;
    const dailyY = costPerKmY * kmDay;

    const monthlyX = dailyX * 30;
    const monthlyY = dailyY * 30;

    const yearlyX = dailyX * 365;
    const yearlyY = dailyY * 365;

    const diffDay = dailyY - dailyX;
    const diffMonth = monthlyY - monthlyX;
    const diffYear = yearlyY - yearlyX;

    bigDiff.innerText = `${diffDay.toFixed(0)} Kč / den`;
    bigDiffDetail.innerText = `+${diffMonth.toFixed(0)} Kč / měsíc · +${diffYear.toFixed(0)} Kč / rok`;

    results.innerHTML = `
        <div class="row"><span>1 km X</span><span>${costPerKmX.toFixed(2)} Kč</span></div>
        <div class="row"><span>1 km Y</span><span>${costPerKmY.toFixed(2)} Kč</span></div>
        <div class="row"><span>Den X</span><span>${dailyX.toFixed(0)} Kč</span></div>
        <div class="row"><span>Den Y</span><span>${dailyY.toFixed(0)} Kč</span></div>
    `;

    const data = {
        labels: ['Měsíc X','Měsíc Y','Rok X','Rok Y'],
        datasets: [{
            label: 'Náklady (Kč)',
            data: [monthlyX, monthlyY, yearlyX, yearlyY]
        }]
    };

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: data,
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });

    saveValues();
}

[priceXInput, priceYInput, consumptionInput, kmDayInput].forEach(input => {
    input.addEventListener('input', calculate);
});

loadValues();
calculate();
</script>

</body>
</html>
