<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Cost Calculator</title>
    <!-- Import písma podobného San Franciscu -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --border-radius: 18px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-secondary);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            background: #fbfbfd;
        }

        input:focus {
            border-color: var(--accent);
            background: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .results {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f2f2f2;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .result-item .label {
            color: var(--text-secondary);
        }

        .result-item .value {
            font-weight: 600;
        }

        .comparison-card {
            background: #f5f5f7;
            padding: 20px;
            border-radius: 14px;
            margin-top: 20px;
            text-align: center;
        }

        .comparison-card .diff-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .comparison-card .diff-value {
            font-size: 28px;
            font-weight: 700;
            color: #d70015; /* Apple Red */
        }

        .comparison-card .diff-value.saving {
            color: #248a3d; /* Apple Green */
        }

        .unit {
            font-size: 14px;
            font-weight: 400;
            margin-left: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Palivo</h1>
        <p class="subtitle">Srovnání nákladů na provoz</p>

        <div class="grid">
            <div class="input-group">
                <label>Cena X (Kč/l)</label>
                <input type="number" id="priceX" placeholder="např. 36.50" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Cena Y (Kč/l)</label>
                <input type="number" id="priceY" placeholder="např. 40.20" step="0.1" oninput="calculate()">
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>Spotřeba (l/100km)</label>
                <input type="number" id="consumption" placeholder="6.5" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Nájezd (km/den)</label>
                <input type="number" id="mileage" placeholder="50" oninput="calculate()">
            </div>
        </div>

        <div class="results" id="resultsArea" style="display: none;">
            <div class="result-item">
                <span class="label">Cena za 1 km (Den X)</span>
                <span class="value" id="costKmX">0.00 Kč</span>
            </div>
            <div class="result-item">
                <span class="label">Cena za 1 km (Den Y)</span>
                <span class="value" id="costKmY">0.00 Kč</span>
            </div>

            <div class="comparison-card">
                <div class="diff-label" id="diffLabel">Denní nárůst nákladů</div>
                <div class="diff-value" id="dailyDiff">0.00 <span class="unit">Kč</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const px = parseFloat(document.getElementById('priceX').value);
        const py = parseFloat(document.getElementById('priceY').value);
        const cons = parseFloat(document.getElementById('consumption').value);
        const dist = parseFloat(document.getElementById('mileage').value);

        const resultsArea = document.getElementById('resultsArea');

        if (px > 0 && py > 0 && cons > 0 && dist > 0) {
            resultsArea.style.display = 'block';

            // Náklady na 1 km = (spotřeba / 100) * cena
            const costX = (cons / 100) * px;
            const costY = (cons / 100) * py;

            // Denní náklady
            const dailyX = costX * dist;
            const dailyY = costY * dist;
            const diff = dailyY - dailyX;

            // Zobrazení výsledků
            document.getElementById('costKmX').innerText = costX.toFixed(2) + ' Kč';
            document.getElementById('costKmY').innerText = costY.toFixed(2) + ' Kč';
            
            const diffElement = document.getElementById('dailyDiff');
            const labelElement = document.getElementById('diffLabel');

            if (diff >= 0) {
                diffElement.innerHTML = `+${diff.toFixed(2)} <span class="unit">Kč</span>`;
                diffElement.classList.remove('saving');
                labelElement.innerText = "Denní nárůst nákladů";
            } else {
                diffElement.innerHTML = `${diff.toFixed(2)} <span class="unit">Kč</span>`;
                diffElement.classList.add('saving');
                labelElement.innerText = "Denní úspora";
            }
        } else {
            resultsArea.style.display = 'none';
        }
    }
</script>

</body>
</html>
