<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka PHM</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 400px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: black;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    .results {
        margin-top: 20px;
        background: #f5f5f7;
        padding: 15px;
        border-radius: 12px;
        font-size: 14px;
    }

    .highlight {
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Kalkulačka nákladů PHM</h1>

    <label>Cena paliva (den X) Kč/l</label>
    <input type="number" id="priceX">

    <label>Cena paliva (den Y) Kč/l</label>
    <input type="number" id="priceY">

    <label>Spotřeba (l / 100 km)</label>
    <input type="number" id="consumption">

    <label>Nájezd (km / den)</label>
    <input type="number" id="kmDay">

    <button onclick="calculate()">Spočítat</button>

    <div class="results" id="results" style="display:none;"></div>
</div>

<script>
function calculate() {
    const priceX = parseFloat(document.getElementById('priceX').value);
    const priceY = parseFloat(document.getElementById('priceY').value);
    const consumption = parseFloat(document.getElementById('consumption').value);
    const kmDay = parseFloat(document.getElementById('kmDay').value);

    if (!priceX || !priceY || !consumption || !kmDay) {
        alert('Vyplň všechna pole');
        return;
    }

    const costPerKmX = (consumption / 100) * priceX;
    const costPerKmY = (consumption / 100) * priceY;

    const dailyCostX = costPerKmX * kmDay;
    const dailyCostY = costPerKmY * kmDay;

    const difference = dailyCostY - dailyCostX;

    const resultDiv = document.getElementById('results');
    resultDiv.style.display = 'block';

    resultDiv.innerHTML = `
        Náklady na 1 km (den X): <span class="highlight">${costPerKmX.toFixed(2)} Kč</span><br>
        Náklady na 1 km (den Y): <span class="highlight">${costPerKmY.toFixed(2)} Kč</span><br><br>
        Denní náklady (den X): <span class="highlight">${dailyCostX.toFixed(2)} Kč</span><br>
        Denní náklady (den Y): <span class="highlight">${dailyCostY.toFixed(2)} Kč</span><br><br>
        Rozdíl za den: <span class="highlight">${difference.toFixed(2)} Kč</span>
    `;
}
</script>

</body>
</html>
