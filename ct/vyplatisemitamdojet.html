<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srovnání: Vyplatí se zajížďka?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 1.2em;
            color: #2980b9;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
            margin-bottom: 15px;
            margin-top: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9em;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .fuel-card {
            background: #fdfefe;
            border: 1px solid #ecf0f1;
            padding: 15px;
            border-radius: 8px;
        }
        .fuel-card.petrol { border-top: 4px solid #e67e22; }
        .fuel-card.diesel { border-top: 4px solid #34495e; }
        
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f8f5;
            border-radius: 6px;
            text-align: center;
        }
        .result-title {
            font-size: 0.85em;
            text-transform: uppercase;
            color: #7f8c8d;
            display: block;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 2em;
            font-weight: bold;
        }
        .petrol .result-value { color: #d35400; }
        .diesel .result-value { color: #2c3e50; }
        
        .hint {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 5px;
        }
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Vyplatí se zajížďka? ⛽ Srovnání</h2>
    
    <div class="section-title">Společné údaje</div>
    <div class="grid-2">
        <div class="form-group">
            <label for="volume">Kolik litrů budete tankovat?</label>
            <input type="number" id="volume" value="50" step="1" min="1">
        </div>
        <div class="form-group">
            <label for="amortization">Amortizace vozu (Kč/km)</label>
            <input type="number" id="amortization" value="0" step="0.5" min="0">
        </div>
    </div>

    <div class="section-title">Porovnání paliv</div>
    <div class="grid-2">
        
        <div class="fuel-card petrol">
            <h3 style="margin-top: 0; color: #e67e22;">Benzín (Natural 95)</h3>
            <div class="form-group">
                <label for="cons_petrol">Spotřeba (l/100 km)</label>
                <input type="number" id="cons_petrol" value="7.0" step="0.1" min="1">
            </div>
            <div class="form-group">
                <label for="price_petrol">Běžná cena (míjená pumpa)</label>
                <input type="number" id="price_petrol" value="38.50" step="0.1" min="1">
            </div>
            <div class="form-group">
                <label for="diff_petrol">O kolik Kč je jinde levnější?</label>
                <input type="number" id="diff_petrol" value="1.50" step="0.1" min="0.1">
            </div>
            
            <div class="result-box">
                <span class="result-title">Max. zajížďka (tam i zpět celkem: <span id="total_petrol">0</span> km)</span>
                <span class="result-title" style="color:#333; font-weight:bold;">VZDÁLENOST JEDNÍM SMĚREM:</span>
                <div class="result-value"><span id="max_petrol">0</span> km</div>
            </div>
        </div>

        <div class="fuel-card diesel">
            <h3 style="margin-top: 0; color: #34495e;">Nafta (Diesel)</h3>
            <div class="form-group">
                <label for="cons_diesel">Spotřeba (l/100 km)</label>
                <input type="number" id="cons_diesel" value="5.5" step="0.1" min="1">
            </div>
            <div class="form-group">
                <label for="price_diesel">Běžná cena (míjená pumpa)</label>
                <input type="number" id="price_diesel" value="38.50" step="0.1" min="1">
            </div>
            <div class="form-group">
                <label for="diff_diesel">O kolik Kč je jinde levnější?</label>
                <input type="number" id="diff_diesel" value="1.50" step="0.1" min="0.1">
            </div>
            
            <div class="result-box">
                <span class="result-title">Max. zajížďka (tam i zpět celkem: <span id="total_diesel">0</span> km)</span>
                <span class="result-title" style="color:#333; font-weight:bold;">VZDÁLENOST JEDNÍM SMĚREM:</span>
                <div class="result-value"><span id="max_diesel">0</span> km</div>
            </div>
        </div>

    </div>
</div>

<script>
    function calculateFuel(type) {
        const volume = parseFloat(document.getElementById('volume').value) || 0;
        const amortization = parseFloat(document.getElementById('amortization').value) || 0;
        
        const consumption = parseFloat(document.getElementById(`cons_${type}`).value) || 0;
        const price = parseFloat(document.getElementById(`price_${type}`).value) || 0;
        const diff = parseFloat(document.getElementById(`diff_${type}`).value) || 0;

        const maxEl = document.getElementById(`max_${type}`);
        const totalEl = document.getElementById(`total_${type}`);

        if (volume > 0 && consumption > 0 && price > 0 && diff > 0) {
            const totalSavings = volume * diff;
            const costPerKm = ((consumption / 100) * price) + amortization;
            
            const maxTotalDistance = totalSavings / costPerKm;
            const maxOneWayDistance = maxTotalDistance / 2;

            maxEl.innerText = maxOneWayDistance.toFixed(1).replace('.', ',');
            totalEl.innerText = maxTotalDistance.toFixed(1).replace('.', ',');
        } else {
            maxEl.innerText = "0";
            totalEl.innerText = "0";
        }
    }

    function calculateAll() {
        calculateFuel('petrol');
        calculateFuel('diesel');
    }

    // Navěšení událostí na všechny inputy
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('input', calculateAll);
    });

    // Prvotní výpočet
    calculateAll();
</script>

</body>
</html>
